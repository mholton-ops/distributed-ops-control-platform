name: distributed-ops-control-platform-test

services:
  postgres:
    image: postgres:16.13-alpine3.23@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      POSTGRES_USER: ops_bootstrap_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD to a strong ephemeral test value}
      POSTGRES_DB: ops_control_test
      OPS_TEST_DB_PASSWORD: ${OPS_TEST_DB_PASSWORD:?Set OPS_TEST_DB_PASSWORD to a separate strong ephemeral test value}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-test-database.sh:/docker-entrypoint-initdb.d/10-init-test-database.sh:ro
      - ./scripts/postgres/check-app-role.sh:/usr/local/bin/check-app-role.sh:ro
    healthcheck:
      test: ["CMD", "sh", "/usr/local/bin/check-app-role.sh"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?Set the vault/runtime Compose PostgreSQL test connection URL}
      LOG_LEVEL: info
      OPS_TEST_AUTH_TOKEN: ${OPS_TEST_AUTH_TOKEN:?Set OPS_TEST_AUTH_TOKEN to a strong ephemeral test value}
      OPS_TEST_ACTOR: ${OPS_TEST_ACTOR:?Set OPS_TEST_ACTOR to an explicit test audit identity}
      SYNC_STALE_MINUTES: ${SYNC_STALE_MINUTES:-45}
      TRANSFER_CONFIRMATION_HOURS: ${TRANSFER_CONFIRMATION_HOURS:-4}
      DUAL_SITE_OBSERVATION_MINUTES: ${DUAL_SITE_OBSERVATION_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/ready').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    init: true
    security_opt:
      - no-new-privileges:true
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000/api/v1
      OPS_TEST_AUTH_TOKEN: ${OPS_TEST_AUTH_TOKEN:?Set OPS_TEST_AUTH_TOKEN to a strong ephemeral test value}
      OPS_TEST_WEB_ORIGIN: ${OPS_TEST_WEB_ORIGIN:-http://127.0.0.1:3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    init: true
    security_opt:
      - no-new-privileges:true
    restart: "no"

volumes:
  postgres_data:
